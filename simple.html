  var html = "";
  var totalPts = 0, totalTbls = 0;
  data.chapters.forEach(function(ch) {
    html += "<h2>" + ch.title + " (" + ch.points.length + ")</h2>";
    ch.points.forEach(function(p) {
      totalPts++;
      html += "<div class='card'><h3>" + p.id + ". " + p.title + "</h3>";
      if (p.content) html += "<p>" + p.content + "</p>";
      if (p.sub_points && p.sub_points.length) {
        p.sub_points.forEach(function(sp) { html += "<p>" + sp + "</p>"; });
      }
      if (p.tables && p.tables.length) {
        totalTbls += p.tables.length;
        p.tables.forEach(function(t) {
          html += "<table style='width:100%;margin:8px 0;border-collapse:collapse;'>";
          html += "<tr>" + t.headers.map(function(h) { return "<th style='border:1px solid #333;padding:6px;text-align:left;'>" + h + "</th>"; }).join("") + "</tr>";

            html += "<tr>" + r.map(function(c) { return "<td style='border:1px solid #333;padding:6px;'>" + c + "</td>"; }).join("") + "</tr>";
          });
          html += "</table>";
        });
      }
      html += "</div>";
    });
  });
